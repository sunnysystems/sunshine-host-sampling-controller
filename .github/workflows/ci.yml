# CI — runs on every push to main and every PR.
#
# NOTE: this workflow lives under host-sampling-controller/.github/ and is DORMANT
# inside the Sunshine monorepo (GitHub Actions only reads .github/workflows/ at the
# repository root). It activates once this subtree becomes the root of the public
# sunnysystems/sunshine-host-sampling-controller repo.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # gofmt check + go vet + go test + go build
      - name: make check
        run: make check

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: helm lint
        run: helm lint chart/
