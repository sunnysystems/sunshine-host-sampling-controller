# CI — gofmt/vet/test/build + helm lint on every push to main and every PR.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # gofmt check + go vet + go test + go build
      - name: make check
        run: make check

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: helm lint
        run: helm lint chart/
