# Release — fires on a semver tag (v1.2.3). Builds a multi-arch image, pushes it
# to GHCR, signs it keylessly with cosign, attaches SBOM + provenance, publishes
# the Helm chart as an OCI artifact (also signed), and cuts a GitHub Release with
# notes pulled from CHANGELOG.md.
#
# Ops notes:
#   - The org Actions allowlist must permit the third-party actions used below
#     (docker/*, sigstore/cosign-installer, azure/setup-helm, action-gh-release).
#   - GHCR packages (host-sampling-controller,
#     charts/sunshine-host-sampling-controller) must be set Public in the org's
#     package settings to be pullable by customers.
#   - Consider pinning actions to commit SHAs as supply-chain hardening.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push image + chart to GHCR
  id-token: write # cosign keyless signing (OIDC)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/host-sampling-controller
  CHART_NAMESPACE: ${{ github.repository_owner }}/charts

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # ── Container image ──────────────────────────────────────────────────────
      - uses: docker/setup-qemu-action@v4 # arm64 cross-build
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true # attach an SBOM attestation to the image
          provenance: mode=max # attach SLSA provenance attestation

      # ── Sign the image (keyless) ────────────────────────────────────────────
      # Pinned to an exact version: sigstore publishes no floating `v4` major
      # alias (unlike the docker/* actions), so `@v4` does not resolve.
      - uses: sigstore/cosign-installer@v4.1.2

      - name: cosign sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      # ── Helm chart as an OCI artifact (pushed + signed) ───────────────────────
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: package, push and sign chart
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | helm registry login "${REGISTRY}" -u "$GHCR_USER" --password-stdin
          helm package chart/ --destination dist/
          chart_tgz="$(ls dist/*.tgz)"
          chart_name="$(helm show chart chart/ | awk '/^name:/{print $2}')"
          helm push "${chart_tgz}" "oci://${REGISTRY}/${CHART_NAMESPACE}" 2>&1 | tee push.log
          chart_digest="$(awk '/[Dd]igest:/{print $2}' push.log)"
          cosign sign --yes "${REGISTRY}/${CHART_NAMESPACE}/${chart_name}@${chart_digest}"

      # ── GitHub Release with notes from CHANGELOG.md ───────────────────────────
      - name: extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { f=1; next }
            f && /^(## |\[)/ { exit }
            f { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md || echo "See CHANGELOG.md" > release-notes.md

      - uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: dist/*.tgz
