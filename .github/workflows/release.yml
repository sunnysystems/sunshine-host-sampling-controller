# Release — fires on a semver tag (v1.2.3). Builds a multi-arch image, pushes it
# to GHCR, signs it keylessly with cosign, attaches SBOM + provenance, publishes
# the Helm chart as an OCI artifact (also signed), and cuts a GitHub Release with
# notes pulled from CHANGELOG.md.
#
# NOTE: dormant inside the Sunshine monorepo (Actions only reads root
# .github/workflows/). Activates when this subtree becomes the public repo root.
#
# One-time setup in the new repo before the first successful run:
#   - Org/repo Actions must allow the third-party actions used below (docker/*,
#     sigstore/cosign-installer, azure/setup-helm, softprops/action-gh-release).
#   - After the first push, set the GHCR packages
#     (host-sampling-controller, charts/sunshine-host-sampling-controller)
#     visibility to Public in the org's package settings — GHCR packages are
#     private by default. Consider pinning actions to commit SHAs as hardening.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push image + chart to GHCR
  id-token: write # cosign keyless signing (OIDC)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/host-sampling-controller
  CHART_NAMESPACE: ${{ github.repository_owner }}/charts

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Container image ──────────────────────────────────────────────────────
      - uses: docker/setup-qemu-action@v3 # arm64 cross-build
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true # attach an SBOM attestation to the image
          provenance: mode=max # attach SLSA provenance attestation

      # ── Sign the image (keyless) ────────────────────────────────────────────
      - uses: sigstore/cosign-installer@v3

      - name: cosign sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      # ── Helm chart as an OCI artifact (pushed + signed) ───────────────────────
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: package, push and sign chart
        run: |
          set -euo pipefail
          helm registry login "${REGISTRY}" -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          helm package chart/ --destination dist/
          chart_tgz="$(ls dist/*.tgz)"
          chart_name="$(helm show chart chart/ | awk '/^name:/{print $2}')"
          helm push "${chart_tgz}" "oci://${REGISTRY}/${CHART_NAMESPACE}" 2>&1 | tee push.log
          chart_digest="$(awk '/[Dd]igest:/{print $2}' push.log)"
          cosign sign --yes "${REGISTRY}/${CHART_NAMESPACE}/${chart_name}@${chart_digest}"

      # ── GitHub Release with notes from CHANGELOG.md ───────────────────────────
      - name: extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { f=1; next }
            f && /^(## |\[)/ { exit }
            f { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md || echo "See CHANGELOG.md" > release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*.tgz
